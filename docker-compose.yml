services:
  sarif:
    build:
      context: .
      dockerfile: Dockerfile

    # ── Port binding ───────────────────────────────────────────────────────────
    # Bind to 127.0.0.1 so the UI is reachable at http://localhost:5173
    # but NOT exposed to other machines on your LAN.
    # The Express API (3001) is intentionally not published — Vite proxies to it
    # internally, so the API is never directly reachable from the host.
    ports:
      - "127.0.0.1:5173:5173"

    # ── API Keys — fill these in ───────────────────────────────────────────────
    # You can set them here directly, or create a .env file alongside
    # docker-compose.yml (it is gitignored) and docker-compose will pick it up.
    #
    # To use a .env file:
    #   cp .env.example .env   # then edit .env with your real keys
    #
    environment:
      # Seats.aero Partner API — powers Award Search (https://seats.aero)
      SEATS_API_KEY: ${SEATS_API_KEY:-}

      # RapidAPI / Sky Scrapper — business & premium cash prices
      # Sign up free at https://rapidapi.com → search "sky-scrapper"
      RAPIDAPI_KEY: ${RAPIDAPI_KEY:-}

      # Travelpayouts — economy cash price baseline (free API)
      # Sign up at https://www.travelpayouts.com/developers/api
      TRAVELPAYOUTS_TOKEN: ${TRAVELPAYOUTS_TOKEN:-}

      # Internal wiring — do not change
      PORT: "3001"
      NODE_ENV: development

    # ── Network isolation ──────────────────────────────────────────────────────
    # Uses a dedicated bridge network.
    # - The container can reach the internet (needed for external APIs).
    # - The container CANNOT reach host-local services (no host.docker.internal
    #   binding, no --network=host, no extra_hosts).
    networks:
      - sarif_net

    restart: unless-stopped

networks:
  sarif_net:
    driver: bridge
